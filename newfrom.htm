<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    header{
        width: 100%;
        height: 60px;
        font-size: 40px;
        text-align: center;
        color: aliceblue;
        background-color: rgb(17, 121, 86);
    }


    .fname{
        text-align: center;
    }
    .container {
      width: 800px;
      height: 600px;
      margin: auto;
      margin-top: 10px;
      background-color:rgb(181, 250, 227);
      padding:33px;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(44, 43, 43, 0.3);
      margin-bottom:20px
    }
    .State{
    
        font-size: 20px;
    }
</style>
<body style="background-image: url('g2.jpg');">

        <div class="container">
        <h1 style="text-align: center; font-size: 43px; margin-bottom:20px ;"><b>Fill all details</b></h1>
        <form>
            <!-- Person First name and last name  -->
            <label for="fname" class="fname">First name: </label>
            <input type="text" style="border: 0cm; font-size: 20px;"><br><br><br>

            <label for="lastname" class="fname" >Last name: </label>
            <input type="text"style="border: 0cm; font-size: 20px;"><br><br><br>

            <!-- person choose gender -->
            <label for="gender" class="fname">Gender: </label>
            <select id="gender" name="Gender" style="border:0cm; font-size: 17px;">
                <option value=""></option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Transgender">Transgender</option>
            </select><br><br><br>

            <!-- mobile number -->
            <label for="mobile" class="fname">Mobile No.:</label>
            <input type="number" name="Mobile No." id="Number" style="border:0cm;  font-size: 19px;"><br><br><br>

            <!-- valid email id -->
            <label for="email id" class="fname">email id:</label>
            <input type="email" style=" width: 150px;font-size: 18px;"><br><br><br>

            <!-- state -->
            <label for="state" class="State" > State:
            <input type="text" style="width: 160px;  border:0dvb; font-size: 20px;" ></label><br><br><br>

            <!--   Home address-->
            <label for="address"class="fname" >Address:</label>
            <input type="text" style="width: 500px; border: 0cqb; font-size:18px"><br><br><br>

        </form>
        <button style="height: 50px; width: 100% ; background-color:#30068C; font-size: 25px; color: thistle; font-family: 'Yellowtail', cursive; border: none; cursor: pointer; border-radius: 5px;">Submit</button>
        </div>
</body>
</html>
